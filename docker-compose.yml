services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./data:/app/data
      - ./source-packs:/app/source-packs

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: finance_hub
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  ingestion-worker:
    build:
      context: .
      dockerfile: workers/ingestion-worker/Dockerfile
    command: ["python", "worker.py", "/app/source-packs", "--out", "/app/data/processed/docling"]
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./data:/app/data
      - ./source-packs:/app/source-packs

  ollama:
    image: ollama/ollama
    profiles:
      - local-ai
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
